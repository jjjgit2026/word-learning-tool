<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语学习助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            min-height: calc(100vh - 30px);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 20px;
            min-height: calc(100vh - 150px);
        }
        
        /* 模式选择页面 */
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
        }
        
        .mode-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .mode-card:active {
            transform: scale(0.98);
        }
        
        .mode-card.book-reading {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .mode-card.word-learning {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .mode-card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .mode-card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .mode-card-desc {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 文件选择页面 */
        .file-selection {
            display: none;
        }
        
        .file-selection.active {
            display: block;
        }
        
        .back-btn {
            background: #f1f2f6;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .file-selector {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .file-selector h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .file-select {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            margin-bottom: 15px;
        }
        
        .file-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
        
        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 课本点读模式 */
        .book-reading-mode {
            display: none;
        }
        
        .book-reading-mode.active {
            display: block;
        }
        
        .pdf-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 400px;
            position: relative;
            box-sizing: border-box;
        }
        
        #textLayer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }
        
        .pdf-canvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
            background: white;
            cursor: pointer;
        }
        
        .page-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        
        .page-nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .page-nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 14px;
            color: #666;
        }
        
        .tap-instruction {
            background: #e3f2fd;
            color: #1565c0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        /* 单词学习模式 */
        .word-learning-mode {
            display: none;
        }
        
        .word-learning-mode.active {
            display: block;
        }
        
        /* 页面列表 */
        .page-list-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .page-list-title {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .page-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .page-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .page-item:active {
            transform: scale(0.95);
        }
        
        .page-item.active {
            border-color: #667eea;
            background: #e3f2fd;
        }
        
        .page-item.empty {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-number {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        
        .page-item.active .page-number {
            color: #667eea;
        }
        
        .word-count {
            font-size: 12px;
            color: #666;
        }
        
        .word-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .word-display {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .english-word {
            font-size: 36px;
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .phonetic {
            font-size: 16px;
            color: #666;
            margin-bottom: 12px;
        }
        
        .chinese-meaning {
            font-size: 20px;
            color: #667eea;
            font-weight: 500;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }
        
        .nav-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .progress-text {
            font-size: 14px;
            color: #666;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 状态提示 */
        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-message.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        
        /* 目录按钮 */
        .toc-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .toc-btn:active {
            transform: scale(0.95);
        }
        
        /* 目录遮罩层 */
        .toc-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .toc-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* 目录面板 */
        .toc-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 320px;
            height: 100%;
            background: white;
            z-index: 1002;
            transform: translateX(-100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        
        .toc-panel.active {
            transform: translateX(0);
        }
        
        /* 目录头部 */
        .toc-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .toc-header h2 {
            font-size: 18px;
            margin: 0;
            font-weight: 600;
        }
        
        .toc-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 目录列表 */
        .toc-list {
            padding: 0;
            list-style: none;
            margin: 0;
        }
        
        .toc-item {
            border-bottom: 1px solid #f0f0f0;
        }
        
        .toc-item-btn {
            width: 100%;
            padding: 15px 20px;
            background: none;
            border: none;
            text-align: left;
            font-size: 15px;
            color: #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .toc-item-btn:active {
            background: #f5f5f5;
        }
        
        .toc-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .toc-item-page {
            color: #999;
            font-size: 14px;
            margin-left: 10px;
        }
        
        .toc-item.current {
            background: #e3f2fd;
        }
        
        .toc-item.current .toc-item-btn {
            color: #667eea;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>英语学习助手</h1>
            <p>课本点读 · 单词学习</p>
        </div>
        
        <div class="content">
            <!-- 模式选择页面 -->
            <div class="mode-selection" id="modeSelection">
                <div class="mode-card book-reading" onclick="selectMode('bookReading')">
                    <div class="mode-card-icon">📖</div>
                    <div class="mode-card-title">课本点读</div>
                    <div class="mode-card-desc">点击PDF中的单词和句子进行朗读</div>
                </div>
                
                <div class="mode-card word-learning" onclick="selectMode('wordLearning')">
                    <div class="mode-card-icon">📚</div>
                    <div class="mode-card-title">单词学习</div>
                    <div class="mode-card-desc">系统化学习单词，支持发音和测试</div>
                </div>
            </div>
            
            <!-- 文件选择页面 -->
            <div class="file-selection" id="fileSelection">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                
                <div class="file-selector">
                    <h3 id="fileSelectorTitle">选择文件</h3>
                    <select id="fileSelect" class="file-select" onchange="handleFileSelect()">
                        <option value="">请选择文件</option>
                    </select>
                    <button id="startBtn" class="start-btn" onclick="startLearning()" disabled>开始学习</button>
                </div>
                
                <div id="statusMessage" class="status-message hidden"></div>
            </div>
            
            <!-- 课本点读模式 -->
            <div class="book-reading-mode" id="bookReadingMode">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                
                <div class="tap-instruction">
                    💡 点击PDF中的文字即可朗读
                </div>
                
                <div class="pdf-container">
                    <div id="textLayer"></div>
                    <canvas id="pdfCanvas" class="pdf-canvas"></canvas>
                </div>
                
                <div class="page-navigation">
                    <button class="page-nav-btn" id="prevPageBtn" onclick="prevPage()">上一页</button>
                    <span class="page-info" id="pageInfo">第 1 页</span>
                    <button class="page-nav-btn" id="nextPageBtn" onclick="nextPage()">下一页</button>
                </div>
                
                <!-- 目录按钮 -->
                <button class="toc-btn" onclick="openTOC()" title="目录">☰</button>
                
                <!-- 目录遮罩层 -->
                <div class="toc-overlay" id="tocOverlay" onclick="closeTOC()"></div>
                
                <!-- 目录面板 -->
                <div class="toc-panel" id="tocPanel">
                    <div class="toc-header">
                        <h2>目录</h2>
                        <button class="toc-close" onclick="closeTOC()">×</button>
                    </div>
                    <ul class="toc-list" id="tocList">
                        <!-- 目录项将通过JavaScript动态生成 -->
                    </ul>
                </div>
            </div>
            
            <!-- 单词学习模式 -->
            <div class="word-learning-mode" id="wordLearningMode">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                
                <!-- 页面列表 -->
                <div class="page-list-container" id="pageListContainer">
                    <div class="page-list-title">📖 选择页面</div>
                    <div class="page-list" id="pageList">
                        <!-- 页面项将通过JavaScript动态生成 -->
                    </div>
                </div>
                
                <div id="wordContent">
                    <div class="word-card">
                        <div class="word-display">
                            <div class="english-word" id="currentWord">alphabet</div>
                            <div class="phonetic" id="currentPhonetic">/ˈælfəbet/</div>
                            <div class="chinese-meaning" id="currentMeaning">n.字母表</div>
                        </div>
                        
                        <div class="controls">
                            <button class="control-btn" onclick="playPronunciation()">🔊</button>
                            <button class="control-btn" onclick="repeatWord()">↻</button>
                        </div>
                    </div>
                    
                    <div class="progress">
                        <button class="nav-btn" onclick="prevWord()" id="prevBtn">上一个</button>
                        <span class="progress-text" id="progressText">单词 1/14</span>
                        <button class="nav-btn" onclick="nextWord()" id="nextBtn">下一个</button>
                    </div>
                </div>
                
                <div id="loadingIndicator" class="loading hidden">
                    <div class="loading-spinner"></div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入PDF.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // 配置PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        // 全局变量
        let currentMode = '';
        let currentFile = '';
        let words = [];
        let currentWordIndex = 0;
        let pdfDoc = null;
        let currentPageNum = 1;
        let totalPages = 0;
        
        // 单词学习模式专用变量
        let wordPdfDoc = null;
        let wordsByPage = {};  // 存储每页的单词 {pageNum: [words]}
        let currentWordPage = 1;
        let totalWordPages = 0;
        
        // 文件列表
        const bookFiles = ['3-2-book.pdf', '4-2-book.pdf', '5-2-book.pdf'];
        const wordFiles = ['3-2-words.pdf', '4-2-words.pdf', '5-2-words.pdf'];
        
        // 选择模式
        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('modeSelection').classList.add('hidden');
            document.getElementById('fileSelection').classList.add('active');
            
            const title = mode === 'bookReading' ? '选择课本文件' : '选择单词文件';
            document.getElementById('fileSelectorTitle').textContent = title;
            
            populateFileSelect(mode);
        }
        
        // 填充文件选择下拉框
        function populateFileSelect(mode) {
            const select = document.getElementById('fileSelect');
            select.innerHTML = '<option value="">请选择文件</option>';
            
            const files = mode === 'bookReading' ? bookFiles : wordFiles;
            files.forEach(file => {
                const option = document.createElement('option');
                option.value = file;
                option.textContent = file;
                select.appendChild(option);
            });
        }
        
        // 处理文件选择
        function handleFileSelect() {
            const select = document.getElementById('fileSelect');
            const startBtn = document.getElementById('startBtn');
            currentFile = select.value;
            
            startBtn.disabled = !currentFile;
        }
        
        // 开始学习
        function startLearning() {
            if (!currentFile) return;
            
            document.getElementById('fileSelection').classList.remove('active');
            
            if (currentMode === 'bookReading') {
                document.getElementById('bookReadingMode').classList.add('active');
                loadPDF(currentFile);
            } else {
                document.getElementById('wordLearningMode').classList.add('active');
                loadWords(currentFile);
            }
        }
        
        // 返回
        function goBack() {
            if (document.getElementById('bookReadingMode').classList.contains('active') || 
                document.getElementById('wordLearningMode').classList.contains('active')) {
                document.getElementById('bookReadingMode').classList.remove('active');
                document.getElementById('wordLearningMode').classList.remove('active');
                document.getElementById('fileSelection').classList.add('active');
            } else if (document.getElementById('fileSelection').classList.contains('active')) {
                document.getElementById('fileSelection').classList.remove('active');
                document.getElementById('modeSelection').classList.remove('hidden');
            }
            
            currentFile = '';
            document.getElementById('fileSelect').value = '';
            document.getElementById('startBtn').disabled = true;
        }
        
        // 加载PDF
        async function loadPDF(filename) {
            try {
                showStatus('正在加载PDF...', 'info');
                pdfDoc = await pdfjsLib.getDocument(filename).promise;
                totalPages = pdfDoc.numPages;
                
                // 自动检测页码偏移量
                await detectPageOffset();
                
                currentPageNum = 1;
                await renderPage(currentPageNum);
                showStatus('PDF加载成功', 'success');
            } catch (error) {
                showStatus('PDF加载失败，请检查文件是否存在', 'error');
            }
        }
        
        // 检测PDF页码偏移量
        async function detectPageOffset() {
            try {
                // 获取第一页的尺寸信息
                const firstPage = await pdfDoc.getPage(1);
                const viewport = firstPage.getViewport({ scale: 1.0 });
                const pageHeight = viewport.height;
                const pageWidth = viewport.width;
                
                // 尝试从前几页提取页码信息
                for (let i = 1; i <= Math.min(10, totalPages); i++) {
                    const page = await pdfDoc.getPage(i);
                    const textContent = await page.getTextContent();
                    const vp = page.getViewport({ scale: 1.0 });
                    
                    // 查找页面角落的数字（可能是页码）
                    const pageNumbers = [];
                    textContent.items.forEach(item => {
                        const text = item.str.trim();
                        // 匹配纯数字（可能是页码）
                        if (/^\d{1,3}$/.test(text)) {
                            const num = parseInt(text);
                            // PDF坐标系：原点在左下角，y向上增长
                            // 转换为从顶部计算的坐标
                            const yFromBottom = item.transform[5];
                            const yFromTop = vp.height - yFromBottom;
                            const x = item.transform[4];
                            
                            // 页码通常在页面底部区域（距离底部50像素内）
                            // 且在左侧或右侧边缘
                            const isAtBottom = yFromBottom < 80;
                            const isAtEdge = x < 100 || x > (vp.width - 100);
                            
                            pageNumbers.push({
                                num: num,
                                x: x,
                                yFromBottom: yFromBottom,
                                yFromTop: yFromTop,
                                isAtBottom: isAtBottom,
                                isAtEdge: isAtEdge,
                                text: text
                            });
                        }
                    });
                    
                    // 优先选择在页面底部边缘的数字作为页码
                    const likelyPageNumbers = pageNumbers.filter(pn => pn.isAtBottom && pn.isAtEdge);
                    
                    if (likelyPageNumbers.length > 0) {
                        // 选择最可能是页码的数字（通常是较小的数字，且在边缘）
                        const detectedPageNum = likelyPageNumbers[0].num;
                        // 计算偏移量：PDF页码 - 实际页码
                        pageOffset = i - detectedPageNum;
                        return;
                    }
                    
                    // 如果没有找到边缘的页码，尝试使用任何在底部的数字
                    const bottomNumbers = pageNumbers.filter(pn => pn.isAtBottom);
                    if (bottomNumbers.length > 0) {
                        const detectedPageNum = bottomNumbers[0].num;
                        pageOffset = i - detectedPageNum;
                        return;
                    }
                }
                
                // 如果自动检测失败，使用默认偏移量
                pageOffset = 0;
            } catch (error) {
                pageOffset = 0;
            }
        }
        
        // 渲染页面
        async function renderPage(pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const canvas = document.getElementById('pdfCanvas');
                const ctx = canvas.getContext('2d');
                
                const viewport = page.getViewport({ scale: 1.5 });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                // 提取文本内容
                const textContent = await page.getTextContent();
                const textLayer = document.getElementById('textLayer');
                textLayer.innerHTML = '';
                
                // 设置textLayer的尺寸与canvas显示尺寸一致
                const canvasRect = canvas.getBoundingClientRect();
                const containerRect = canvas.parentElement.getBoundingClientRect();
                
                // 计算canvas相对于container的偏移（考虑padding）
                const offsetX = canvasRect.left - containerRect.left;
                const offsetY = canvasRect.top - containerRect.top;
                
                // 设置textLayer位置和尺寸
                textLayer.style.left = `${offsetX}px`;
                textLayer.style.top = `${offsetY}px`;
                textLayer.style.width = `${canvasRect.width}px`;
                textLayer.style.height = `${canvasRect.height}px`;
                
                // 创建可点击的文本层
                if (textContent && textContent.items) {
                    // 计算CSS缩放比例（canvas可能被CSS缩放了）
                    const cssScaleX = canvasRect.width / canvas.width;
                    const cssScaleY = canvasRect.height / canvas.height;
                    
                    textContent.items.forEach((item, index) => {
                        if (item.str && item.transform && item.height && item.str.trim()) {
                            const span = document.createElement('span');
                            span.textContent = item.str;
                            span.style.position = 'absolute';
                            
                            // PDF坐标：原点在左下角，x向右，y向上
                            // transform: [scaleX, skewY, skewX, scaleY, translateX, translateY]
                            const pdfX = item.transform[4];
                            const pdfY = item.transform[5];
                            
                            // 计算缩放后的坐标
                            // 1. 先应用viewport的scale
                            const viewportScale = viewport.scale;
                            const scaledX = pdfX * viewportScale;
                            const scaledY = pdfY * viewportScale;
                            const scaledHeight = item.height * viewportScale;
                            
                            // 2. 再应用CSS缩放
                            const cssX = scaledX * cssScaleX;
                            const cssY = scaledY * cssScaleY;
                            const cssHeight = scaledHeight * cssScaleY;
                            
                            // 3. 转换为CSS坐标（从左上角开始）
                            // PDF的y坐标是从底部向上，需要转换为从顶部向下
                            const finalX = cssX;
                            const finalY = canvasRect.height - cssY - cssHeight;
                            
                            span.style.left = `${finalX}px`;
                            span.style.top = `${finalY}px`;
                            span.style.fontSize = `${cssHeight}px`;
                            span.style.fontFamily = 'sans-serif';
                            span.style.color = 'transparent';
                            span.style.backgroundColor = 'rgba(255, 255, 255, 0.01)';
                            span.style.pointerEvents = 'auto';
                            span.style.cursor = 'pointer';
                            span.style.whiteSpace = 'nowrap';
                            span.style.userSelect = 'none';
                            span.style.padding = '4px 8px'; // 增加点击区域
                            span.style.margin = '-2px -4px'; // 补偿padding增加的空间
                            span.style.borderRadius = '3px';
                            span.style.transition = 'background-color 0.2s';
                            span.style.lineHeight = '1';
                            
                            // 添加悬停效果
                            span.onmouseenter = () => {
                                span.style.backgroundColor = 'rgba(102, 126, 234, 0.2)';
                            };
                            span.onmouseleave = () => {
                                span.style.backgroundColor = 'rgba(255, 255, 255, 0.01)';
                            };
                            
                            span.onclick = (e) => {
                                e.stopPropagation();
                                speakText(item.str);
                                // 点击时显示视觉反馈
                                span.style.backgroundColor = 'rgba(102, 126, 234, 0.5)';
                                setTimeout(() => {
                                    span.style.backgroundColor = 'rgba(102, 126, 234, 0.2)';
                                }, 200);
                            };
                            textLayer.appendChild(span);
                        }
                    });
                }
                
                // 显示实际页码（PDF页码 - 偏移量）
                const actualPageNum = pageNum - pageOffset;
                const actualTotalPages = totalPages - pageOffset;
                document.getElementById('pageInfo').textContent = `第 ${actualPageNum} / ${actualTotalPages} 页`;
                document.getElementById('prevPageBtn').disabled = pageNum <= 1;
                document.getElementById('nextPageBtn').disabled = pageNum >= totalPages;
            } catch (error) {
            }
        }
        
        // 上一页
        function prevPage() {
            if (currentPageNum > 1) {
                currentPageNum--;
                renderPage(currentPageNum);
            }
        }
        
        // 下一页
        function nextPage() {
            if (currentPageNum < totalPages) {
                currentPageNum++;
                renderPage(currentPageNum);
            }
        }
        
        // 加载单词（从PDF按页读取）
        async function loadWords(filename) {
            try {
                showLoading(true);
                
                // 直接从PDF文件读取单词
                wordPdfDoc = await pdfjsLib.getDocument(filename).promise;
                totalWordPages = wordPdfDoc.numPages;
                wordsByPage = {};
                
                // 逐页提取单词
                for (let pageNum = 1; pageNum <= totalWordPages; pageNum++) {
                    const pageWords = await extractWordsFromPage(wordPdfDoc, pageNum);
                    if (pageWords.length > 0) {
                        wordsByPage[pageNum] = pageWords;
                    }
                }
                
                // 生成页面列表
                generatePageList();
                
                // 默认显示第一页
                currentWordPage = 1;
                selectWordPage(1);
                
                const totalWords = Object.values(wordsByPage).reduce((sum, pageWords) => sum + pageWords.length, 0);
                showStatus(`共加载 ${totalWords} 个单词，分布在 ${Object.keys(wordsByPage).length} 页`, 'success');
                
            } catch (error) {
                showStatus('单词加载失败，请检查PDF文件', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // 从PDF页面提取单词 - 从4线3格中提取
        async function extractWordsFromPage(pdfDoc, pageNum) {
            try {
                const page = await pdfDoc.getPage(pageNum);
                const textContent = await page.getTextContent();
                
                const pageWords = [];
                const extractedKeys = new Set(); // 用于去重 - 基于行内容
                
                // 按行组织文本项（根据y坐标）
                const linesMap = new Map();
                if (textContent && textContent.items) {
                    textContent.items.forEach(item => {
                        if (!item.str || !item.transform) return;
                        if (!item.str.trim()) return;
                        
                        // 获取y坐标（四舍五入到整数，合并相近的行）
                        const y = Math.round(item.transform[5]);
                        if (!linesMap.has(y)) {
                            linesMap.set(y, []);
                        }
                        linesMap.get(y).push(item);
                    });
                }
                
                // 按y坐标排序（从上到下）
                const sortedY = Array.from(linesMap.keys()).sort((a, b) => b - a);
                
                // 找到第一个4线3格的位置（通过检测特定模式或跳过页眉）
                // 通常单词表的4线3格在页面中下部，跳过页眉和标题
                let startIndex = 0;
                const lines = [];
                
                for (let i = 0; i < sortedY.length; i++) {
                    const y = sortedY[i];
                    const items = linesMap.get(y);
                    // 按x坐标排序
                    items.sort((a, b) => a.transform[4] - b.transform[4]);
                    
                    // 构建行文本，去除重复的文本项
                    let lineText = '';
                    const seenTexts = new Set();
                    for (const item of items) {
                        const text = item.str;
                        // 避免重复添加相同的文本（检查是否已存在）
                        if (!seenTexts.has(text)) {
                            lineText += text;
                            seenTexts.add(text);
                        }
                    }
                    lineText = lineText.trim();
                    
                    if (lineText) {
                        lines.push({
                            text: lineText,
                            y: y,
                            items: items
                        });
                    }
                }
                
                // 跳过页面顶部的标题等内容，找到第一个看起来像单词的行
                // 4线3格中的单词通常以英文字母开头
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    // 检测是否是单词行（以英文字母开头，包含单词字符）
                    if (/^[a-zA-Z][a-zA-Z\s'-]*$/.test(line.text)) {
                        startIndex = i;
                        break;
                    }
                }
                for (let i = startIndex; i < lines.length; i++) {
                    const currentLine = lines[i];
                    const nextLine = lines[i + 1];
                    
                    const trimmedText = currentLine.text.trim();
                    if (!trimmedText) continue;
                    
                    // 检测是否是单词行（支持单词和多词词组）
                    // 格式：单词 或 单词 音标 或 多词词组
                    const wordMatch = trimmedText.match(/^([a-zA-Z][a-zA-Z\s'-]{0,50})$/);
                    
                    if (wordMatch) {
                        const english = wordMatch[1].trim();
                        
                        // 去重检查 - 使用行号+单词作为key，确保同一行只取一次
                        const lineKey = `line_${i}_${english.toLowerCase()}`;
                        
                        // 如果这一行已经处理过这个单词，跳过
                        if (extractedKeys.has(lineKey)) {
                            continue;
                        }
                        extractedKeys.add(lineKey);
                        
                        // 词性和释义从下一行获取
                        let chinese = '';
                        if (nextLine) {
                            const nextText = nextLine.text.trim();
                            // 下一行应该是词性和释义（以中文或词性标记开头）
                            // 允许中文、英文、数字、标点符号等
                            if (/[\u4e00-\u9fa5]/.test(nextText) && 
                                (nextText.includes('.') || /[\u4e00-\u9fa5]/.test(nextText))) {
                                chinese = nextText;
                            }
                        }
                        
                        pageWords.push({
                            english: english,
                            phonetic: '', // 音标需要网络查询
                            chinese: chinese,
                            page: pageNum,
                            needsPhoneticLookup: true // 标记需要查询音标
                        });
                    }
                }
                
                return pageWords;
            } catch (error) {
                return [];
            }
        }
        
        // 音标映射表（从JSON文件加载）
        let phoneticMap = {};
        
        // 加载音标数据
        async function loadPhoneticData() {
            try {
                const response = await fetch('phonetic.json');
                if (!response.ok) {
                    throw new Error('Failed to load phonetic data');
                }
                phoneticMap = await response.json();
            } catch (error) {
                // 使用默认的空映射表
                phoneticMap = {};
            }
        }
        
        // 查询单词音标 - 使用本地映射表
        function lookupPhonetic(word) {
            return new Promise((resolve) => {
                // 首先检查本地映射表
                const lowerWord = word.toLowerCase();
                if (phoneticMap[lowerWord]) {
                    resolve(phoneticMap[lowerWord]);
                    return;
                }
                
                // 尝试使用浏览器的语音合成API获取音标提示
                // 虽然无法获取标准音标，但可以提供发音
                resolve('');
            });
        }
        
        // 生成页面列表
        function generatePageList() {
            const pageList = document.getElementById('pageList');
            pageList.innerHTML = '';
            
            for (let pageNum = 1; pageNum <= totalWordPages; pageNum++) {
                const pageWords = wordsByPage[pageNum] || [];
                const wordCount = pageWords.length;
                
                const pageItem = document.createElement('div');
                pageItem.className = 'page-item' + (wordCount === 0 ? ' empty' : '');
                pageItem.dataset.page = pageNum;
                
                if (wordCount > 0) {
                    pageItem.onclick = () => selectWordPage(pageNum);
                }
                
                const pageNumberDiv = document.createElement('div');
                pageNumberDiv.className = 'page-number';
                pageNumberDiv.textContent = `P${pageNum}`;
                
                const wordCountDiv = document.createElement('div');
                wordCountDiv.className = 'word-count';
                wordCountDiv.textContent = wordCount > 0 ? `${wordCount}词` : '空';
                
                pageItem.appendChild(pageNumberDiv);
                pageItem.appendChild(wordCountDiv);
                pageList.appendChild(pageItem);
            }
        }
        
        // 选择单词页面
        async function selectWordPage(pageNum) {
            if (!wordsByPage[pageNum] || wordsByPage[pageNum].length === 0) {
                return;
            }
            
            currentWordPage = pageNum;
            words = wordsByPage[pageNum];
            currentWordIndex = 0;
            
            // 更新页面列表选中状态
            document.querySelectorAll('.page-item').forEach(item => {
                item.classList.remove('active');
                if (parseInt(item.dataset.page) === pageNum) {
                    item.classList.add('active');
                }
            });
            
            // 显示该页第一个单词
            await displayWord();
        }
        
        // 显示单词
        async function displayWord() {
            if (words.length === 0) return;
            
            const word = words[currentWordIndex];
            document.getElementById('currentWord').textContent = word.english;
            document.getElementById('currentMeaning').textContent = word.chinese || '';
            
            // 处理音标显示
            let phonetic = word.phonetic || '';
            
            // 如果没有音标且需要查询，则进行网络查询
            if (!phonetic) {
                document.getElementById('currentPhonetic').textContent = '查询中...';
                try {
                    phonetic = await lookupPhonetic(word.english);
                    // 缓存查询结果
                    word.phonetic = phonetic;
                } catch (err) {
                    phonetic = '';
                }
            }
            
            document.getElementById('currentPhonetic').textContent = phonetic || '';
            
            // 显示页面和单词进度
            document.getElementById('progressText').textContent = 
                `第${currentWordPage}页 ${currentWordIndex + 1}/${words.length}`;
            document.getElementById('prevBtn').disabled = currentWordIndex <= 0;
            document.getElementById('nextBtn').disabled = currentWordIndex >= words.length - 1;
        }
        
        // 上一个单词
        async function prevWord() {
            if (currentWordIndex > 0) {
                currentWordIndex--;
                await displayWord();
            } else {
                // 当前页第一个单词，尝试切换到上一页
                const prevPageNum = currentWordPage - 1;
                if (wordsByPage[prevPageNum] && wordsByPage[prevPageNum].length > 0) {
                    await selectWordPage(prevPageNum);
                    // 跳转到上一页最后一个单词
                    currentWordIndex = words.length - 1;
                    await displayWord();
                    showStatus(`已切换到第${prevPageNum}页`, 'info');
                }
            }
        }
        
        // 下一个单词
        async function nextWord() {
            if (currentWordIndex < words.length - 1) {
                currentWordIndex++;
                await displayWord();
            } else {
                // 当前页最后一个单词，尝试切换到下一页
                const nextPageNum = currentWordPage + 1;
                if (wordsByPage[nextPageNum] && wordsByPage[nextPageNum].length > 0) {
                    await selectWordPage(nextPageNum);
                    showStatus(`已切换到第${nextPageNum}页`, 'info');
                }
            }
        }
        
        // 播放发音
        function playPronunciation() {
            const word = words[currentWordIndex];
            if (word && word.english) {
                speak(word.english);
            }
        }
        
        // 重复单词
        function repeatWord() {
            playPronunciation();
        }
        
        // 语音合成
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音合成功能');
            }
        }
        
        // 朗读文本（用于课本点读）
        function speakText(text) {
            if (text && text.trim()) {
                const trimmedText = text.trim();
                speak(trimmedText);
            }
        }
        
        // 显示状态
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message ${type}`;
            statusDiv.classList.remove('hidden');
            
            setTimeout(() => {
                statusDiv.classList.add('hidden');
            }, 3000);
        }
        
        // 显示/隐藏加载状态
        function showLoading(show) {
            const loadingDiv = document.getElementById('loadingIndicator');
            const wordContent = document.getElementById('wordContent');
            
            if (show) {
                loadingDiv.classList.remove('hidden');
                wordContent.classList.add('hidden');
            } else {
                loadingDiv.classList.add('hidden');
                wordContent.classList.remove('hidden');
            }
        }
        
        // 目录数据 - 根据外研社Join In版五年级下册课本结构
        const tocData = [
            { title: 'Starter unit Join in again', page: 2 },
            { title: 'Unit 1 Phone calls', page: 8 },
            { title: 'Unit 2 Life in the Arctic', page: 14 },
            { title: 'Unit 3 Television', page: 20 },
            { title: 'Revision 1', page: 26 },
            { title: 'Unit 4 In town', page: 32 },
            { title: 'Unit 5 On the beach', page: 38 },
            { title: 'Unit 6 Adventures', page: 44 },
            { title: 'Revision 2', page: 50 },
            { title: 'Supplementary activities', page: 58 },
            { title: 'Two plays', page: 68 },
            { title: 'Word list', page: 72 },
            { title: 'Vocabulary', page: 76 },
            { title: 'Proper names', page: 82 }
        ];
        
        // PDF页码偏移量（PDF页码与实际页码的差值）
        // 例如：如果PDF第3页对应实际第1页，则偏移量为2
        let pageOffset = 0;
        
        // 打开目录
        function openTOC() {
            document.getElementById('tocOverlay').classList.add('active');
            document.getElementById('tocPanel').classList.add('active');
            generateTOC();
        }
        
        // 关闭目录
        function closeTOC() {
            document.getElementById('tocOverlay').classList.remove('active');
            document.getElementById('tocPanel').classList.remove('active');
        }
        
        // 生成目录
        function generateTOC() {
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';
            
            // 计算当前实际页码
            const currentActualPage = currentPageNum - pageOffset;
            
            tocData.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                // 使用实际页码比较
                if (item.page === currentActualPage) {
                    li.classList.add('current');
                }
                
                const btn = document.createElement('button');
                btn.className = 'toc-item-btn';
                btn.onclick = () => goToPage(item.page);
                
                const title = document.createElement('span');
                title.className = 'toc-item-title';
                title.textContent = item.title;
                
                const pageNum = document.createElement('span');
                pageNum.className = 'toc-item-page';
                pageNum.textContent = item.page;
                
                btn.appendChild(title);
                btn.appendChild(pageNum);
                li.appendChild(btn);
                tocList.appendChild(li);
            });
        }
        
        // 跳转到指定页面
        function goToPage(actualPageNum) {
            // 将实际页码转换为PDF页码
            const pdfPageNum = actualPageNum + pageOffset;
            
            if (pdfPageNum >= 1 && pdfPageNum <= totalPages) {
                currentPageNum = pdfPageNum;
                renderPage(currentPageNum);
                closeTOC();
            } else {
                showStatus(`页码 ${actualPageNum} 超出范围`, 'error');
            }
        }
        
        // 页面加载完成后初始化
        window.onload = async function() {
            await loadPhoneticData();
        };
    </script>
</body>
