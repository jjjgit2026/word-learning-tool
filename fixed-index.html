<body>
    <div class="container">
        <div class="header">
            <h1>英语单词学习</h1>
            <p>根据外研社Join in版字帖生成</p>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="switchMode('learn')">学习模式</button>
                <button class="mode-btn" onclick="switchMode('test')">测试模式</button>
            </div>
        </div>
        
        <div class="content">
            <!-- 文件上传区域 -->
            <div class="upload-section" id="uploadSection">
                <h3>📚 单词库管理</h3>
                <div class="upload-controls">
                    <select id="pdfSelect" class="file-select">
                        <option value="">请选择PDF文件</option>
                    </select>
                    <button class="btn upload-btn" onclick="handlePDFSelect()">选择PDF文件</button>
                    <button class="btn clear-btn" onclick="clearWordLibrary()">清空单词库</button>
                </div>
                <div class="upload-status" id="uploadStatus">请选择PDF文件以加载单词库</div>
            </div>
            
            <!-- 页面选择区域 (默认隐藏，上传文件后显示) -->
            <div class="page-selector" id="pageSelector" style="display: none;">
                <h3>📄 页面选择</h3>
                <div class="page-buttons" id="pageButtons"></div>
                <div class="page-status" id="pageStatus">请选择要学习的页面</div>
            </div>
            
            <!-- 学习模式 -->
            <div id="learnMode" style="display: none;">
                <div class="word-card">
                    <div class="word-display">
                        <div class="english-word" id="currentWord">alphabet</div>
                        <div class="phonetic" id="currentPhonetic">/ˈælfəbet/</div>
                        <div class="chinese-meaning" id="currentMeaning">n.字母表</div>
                    </div>
                    
                    <div class="example-sentence" id="exampleSentence">
                        <div class="sentence-label">
                            例句：
                            <button class="sentence-play-btn" onclick="playSentence()">🔊</button>
                        </div>
                        <div class="sentence-english" id="sentenceEnglish">It gave me sounds and the alphabet.</div>
                        <div class="sentence-chinese" id="sentenceChinese">她教我发声和认识字母表。</div>
                    </div>
                    
                    <div class="controls">
                        <button class="control-btn" onclick="playPronunciation()">🔊</button>
                        <button class="control-btn" id="recordBtn" onclick="toggleRecording()">🎤</button>
                        <button class="control-btn" onclick="repeatWord()">↻</button>
                    </div>
                    
                    <div class="score-display">
                        <div class="stars" id="scoreStars">★★★★★</div>
                        <div class="feedback" id="feedback">点击麦克风开始跟读</div>
                    </div>
                    
                    <div class="voice-status" id="voiceStatus">语音功能准备就绪</div>
                </div>
                
                <div class="progress">
                    <button class="nav-btn" onclick="prevWord()" id="prevBtn">上一个</button>
                    <span id="progressText">单词 1/14</span>
                    <button class="nav-btn" onclick="nextWord()" id="nextBtn">下一个</button>
                </div>
            </div>
            
            <!-- 测试模式 -->
            <div class="test-container" id="testMode">
                <div class="test-question" id="testQuestion"></div>
                <input type="text" class="answer-input" id="answerInput" placeholder="请输入英文单词...">
                <button class="submit-btn" onclick="checkAnswer()">提交答案</button>
                
                <div class="result" id="testResult"></div>
                
                <div class="progress">
                    <button class="nav-btn" onclick="prevTest()" id="prevTestBtn">上一题</button>
                    <span id="testProgress">题目 1/14</span>
                    <button class="nav-btn" onclick="nextTest()" id="nextTestBtn">下一题</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入PDF.js库 -->

        // 获取PDF文件列表
        function getPDFFiles() {
            // 只显示当前目录中已知存在的PDF文件
            const pdfFileNames = ['5-2.pdf'];
            
            const pdfSelect = document.getElementById('pdfSelect');
            pdfSelect.innerHTML = '<option value="">请选择PDF文件</option>';
            
            // 添加已知存在的PDF文件选项
            pdfFileNames.forEach(fileName => {
                // 创建一个option元素
                const option = document.createElement('option');
                option.value = fileName;
                option.textContent = fileName;
                pdfSelect.appendChild(option);
            });
        }

        // 处理PDF文件选择
        function handlePDFSelect() {
            const pdfSelect = document.getElementById('pdfSelect');
            const selectedFile = pdfSelect.value;
            
            if (!selectedFile) {
                updateUploadStatus('请先选择PDF文件', 'error');
                return;
            }
            
            // 保存当前PDF文件名
            currentPDFFile = selectedFile;
            
            updateUploadStatus(`正在加载PDF文件: ${selectedFile}`, 'info');
            console.log('开始加载PDF文件:', selectedFile);
            
            // 使用fetch加载PDF文件
            const pdfUrl = selectedFile;
            
            fetch(pdfUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('PDF文件加载失败');
                    }
                    return response.arrayBuffer();
                })
                .then(arrayBuffer => {
                    console.log('PDF文件加载成功:', selectedFile);
                    updateUploadStatus(`PDF文件加载成功: ${selectedFile}`, 'success');
                    parsePDF(arrayBuffer);
                })
                .catch(error => {
                    updateUploadStatus('PDF文件加载失败: ' + error.message, 'error');
                    console.error('PDF文件加载失败:', error);
                });
        }

        // 自动加载PDF文件
        function autoLoadPDF() {
            // 只尝试加载当前目录中已知存在的PDF文件
            const pdfFileNames = ['5-2.pdf'];
            
            // 尝试按顺序加载PDF文件
            function tryLoadPDF(index) {
                if (index >= pdfFileNames.length) {
                    updateUploadStatus('未找到PDF文件，请手动选择', 'info');
                    console.log('所有PDF文件尝试加载失败');
                    return;
                }
                
                const pdfFileName = pdfFileNames[index];
                updateUploadStatus(`正在尝试加载PDF文件: ${pdfFileName}`, 'info');
                console.log('开始自动加载PDF文件:', pdfFileName);
                
                const pdfUrl = pdfFileName;
                
                // 使用fetch加载PDF文件
                fetch(pdfUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('PDF文件加载失败');
                        }
                        return response.arrayBuffer();
                    })
                    .then(arrayBuffer => {
                        // 保存当前PDF文件名
                        currentPDFFile = pdfFileName;
                        console.log('PDF文件加载成功:', pdfFileName);
                        updateUploadStatus(`PDF文件加载成功: ${pdfFileName}`, 'success');

                    })

                        console.log('加载PDF失败，尝试下一个文件:', error.message);
                        tryLoadPDF(index + 1);

            // 开始尝试加载PDF文件

        // PDF解析函数
        function parsePDF(arrayBuffer) {
            updateUploadStatus('正在解析PDF文件...', 'info');
            console.log('开始解析PDF文件');
            
            // 使用PDF.js解析文件
            pdfjsLib.getDocument({ data: arrayBuffer }).promise
                .then(function(pdf) {
                    console.log('PDF解析成功，共', pdf.numPages, '页');
                    updateUploadStatus(`PDF解析成功，共 ${pdf.numPages} 页`, 'success');
                    
                    // 解析每一页
                    processPDFPages(pdf);
                })
                .catch(function(error) {
                    updateUploadStatus('PDF解析失败: ' + error.message, 'error');
                    console.error('PDF解析失败:', error);
                });
        }

        // 处理PDF页面
        function processPDFPages(pdf) {
            const numPages = pdf.numPages;
            let processedPages = 0;
            
            // 重置单词库
            wordLibrary = {
                originalWords: [],
                uniqueWords: [],
                pages: {},
                currentPage: null,
                currentWords: []
            };
            
            // 解析每一页
            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                pdf.getPage(pageNum).then(function(page) {
                    return page.getTextContent();
                }).then(function(textContent) {
                    // 提取文本并按行组织
                    const pageText = organizeTextByLines(textContent.items);
                    console.log('=== 页面', pageNum, '分析开始 ===');
                    console.log('原始文本行数:', pageText.split('\n').length);
                    console.log('原始文本:', pageText);
                    
                    // 提取单词
                    const pageWords = extractWordsFromText(pageText, pageNum);
                    console.log('页面', pageNum, '提取结果:', pageWords);
                    
                    wordLibrary.pages[`page${pageNum}`] = pageWords;
                    wordLibrary.originalWords = wordLibrary.originalWords.concat(pageWords);
                    
                    processedPages++;
                    updateUploadStatus(`正在处理页面 ${processedPages}/${numPages} (提取 ${pageWords.length} 个单词)`, 'info');
                    
                    // 所有页面处理完成
                    if (processedPages === numPages) {
                        finalizeWordLibrary();
                    }
                }).catch(function(error) {
                    console.error('处理页面', pageNum, '失败:', error);
                    processedPages++;
                    
                    if (processedPages === numPages) {
                        finalizeWordLibrary();
                    }
                });
            }
        }

        // 按行组织PDF文本
        function organizeTextByLines(items) {
            // 按行高分组文本项目
            const lines = [];
            let currentLine = [];
            let lastY = null;
            const yTolerance = 0.1; // 行高容差
            
            // 按y坐标排序，确保从上到下处理
            items.sort((a, b) => {
                const yA = a.transform[5]; // y坐标
                const yB = b.transform[5];
                return yB - yA; // 倒序，因为PDF坐标系统y轴向下
            });
            
            for (const item of items) {
                const y = item.transform[5];
                
                if (lastY === null || Math.abs(y - lastY) > yTolerance) {
                    if (currentLine.length > 0) {
                        // 按x坐标排序，确保从左到右排列
                        currentLine.sort((a, b) => a.transform[4] - b.transform[4]);
                        const lineText = currentLine.map(item => item.str).join('');
                        lines.push(lineText);
                        currentLine = [];
                    }
                    lastY = y;
                }
                
                currentLine.push(item);
            }
            
            // 处理最后一行
            if (currentLine.length > 0) {
                currentLine.sort((a, b) => a.transform[4] - b.transform[4]);
                const lineText = currentLine.map(item => item.str).join('');
                lines.push(lineText);
            }
            
            return lines.join('\n');
        }
        
        // 从文本中提取单词
        function extractWordsFromText(text, pageNum) {
            // 增强的提取算法，支持词性、中文释义和音标的提取
            const words = [];
            
            console.log('=== 开始提取单词 ===');
            console.log('输入文本:', text);
            
            // 清理文本
            let cleanText = text.replace(/\s+/g, ' ').trim();
            console.log('清理后文本:', cleanText);
            
            // 方法1：增强的单词提取，支持词性和音标
            console.log('方法1：增强的单词提取');
            
            // 分割文本为行
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            console.log('分割后的行:', lines);
            
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                
                // 跳过空行和标题行
                if (!line || line.toLowerCase().includes('join in') || 
                    line.includes('外研社') || line.includes('英语') || 
                    line.includes('单词') || line.includes('班级') || 
                    line.includes('姓名') || line.includes('用时') || 
                    line.includes('得分')) {
                    i++;
                    continue;
                }
                
                // 尝试识别单词行（可能包含重复的英文单词或词组）
                const wordsInLine = line.split(/\s+/).filter(w => w.length > 0);
                if (wordsInLine.length > 0) {
                    // 收集连续的英文单词（支持含有连接符号的单词）
                    const englishWords = [];
                    let partOfSpeech = '';
                    
                    for (const word of wordsInLine) {
                        if (/^[a-zA-Z]+(?:-[a-zA-Z]+)*$/.test(word)) {
                            englishWords.push(word);
                        } else if (/^(n\.|v\.|adj\.|adv\.|pron\.|prep\.|conj\.|int\.)(?:\/(n\.|v\.|adj\.|adv\.|pron\.|prep\.|conj\.|int\.))*$/.test(word)) {
                            // 提取词性
                            partOfSpeech = word;
                            break;
                        } else {
                            break; // 遇到非英文单词和非词性时停止
                        }
                    }
                    
                    if (englishWords.length > 0) {
                        // 检测重复的词组模式
                        let phrase = '';
                        
                        // 检查是否是单个单词重复的模式
                        const firstWord = englishWords[0];
                        const isSingleWordRepeat = englishWords.every(word => word === firstWord);
                        
                        if (isSingleWordRepeat) {
                            // 单个单词重复的情况，提取为单个单词
                            phrase = firstWord;
                            console.log('找到重复的单个单词:', phrase);
                        } else if (englishWords.length > 1) {

                            let phraseLength = 1;
                            let foundRepeat = false;
                            
                            // 尝试不同长度的词组
                            for (let len = 2; len <= 5; len++) { // 支持最多5个单词的词组
                                if (englishWords.length >= len * 2) {
                                    const potentialPhrase = englishWords.slice(0, len).join(' ');
                                    const nextPhrase = englishWords.slice(len, len * 2).join(' ');
                                    
                                    if (potentialPhrase === nextPhrase) {
                                        phrase = potentialPhrase;
                                        foundRepeat = true;
                                        console.log(`找到重复的${len}词词组:`, phrase);
                                        break;
                                    }
                                }
                            }
                            
                            if (!foundRepeat) {
                                // 如果没有找到重复模式，尝试识别完整的词组
                                // 对于像"see you tomorrow"这样的词组，尝试使用整个英文单词列表
                                phrase = englishWords.join(' ');
                                console.log('找到多词词组:', phrase);
                            }
                        } else {
                            // 单个单词
                            phrase = englishWords[0];
                            console.log('找到单个单词:', phrase);
                        }
                        
                        // 查找下一行，可能包含音标和中文释义
                        if (i + 1 < lines.length) {
                            const nextLine = lines[i + 1];
                            console.log('检查下一行:', nextLine);
                            
                            // 解析下一行，提取音标和中文释义
                            const { phonetic, chinese } = parseWordDetails(nextLine);
                            
                            if (chinese) {
                                // 构建完整的中文释义
                                let fullChinese = '';
                                if (partOfSpeech) {
                                    fullChinese += partOfSpeech + ' ';
                                }
                                fullChinese += chinese;
                                
                                // 检查是否已经存在这个词组
                                const exists = words.some(word => word.english === phrase);
                                if (!exists) {
                                    words.push({
                                        english: phrase,
                                        phonetic: phonetic,
                                        chinese: fullChinese.trim(),
                                        page: pageNum
                                    });
                                    console.log('添加单词/词组:', phrase, '- 音标:', phonetic, '- 中文:', fullChinese.trim());
                                }
                                
                                // 跳过下一行（已经处理过了）
                                i += 2;
                                continue;
                            }
                        } 
                        
                        // 如果没有找到中文释义，尝试从当前行提取
                        const { phonetic, chinese } = parseWordDetails(line);
                        if (chinese) {
                            // 构建完整的中文释义
                            let fullChinese = '';
                            if (partOfSpeech) {
                                fullChinese += partOfSpeech + ' ';
                            }
                            fullChinese += chinese;
                            
                            // 检查是否已经存在这个单词
                            const exists = words.some(word => word.english === phrase);
                            if (!exists) {
                                words.push({
                                    english: phrase,
                                    phonetic: phonetic,
                                    chinese: fullChinese.trim(),
                                    page: pageNum
                                });
                                console.log('添加单词/词组:', phrase, '- 音标:', phonetic, '- 中文:', fullChinese.trim());
                            }
                        }
                    }
                }
                
                i++;
            }
            
            // 方法2：如果方法1失败，尝试使用正则表达式
            if (words.length === 0) {
                console.log('方法2：使用正则表达式提取');
                
                // 查找包含单词、音标和中文的模式
                const patterns = [
                    // 模式1：单词 + 音标 + 中文
                    /([a-zA-Z]+(?:-[a-zA-Z]+)*)\s*([/\[]+.*?[/\]]+)\s*([\u4e00-\u9fa5]+.*?)(?=\s*[a-zA-Z]+|$)/g,
                    // 模式2：单词 + 中文
                    /([a-zA-Z]+(?:-[a-zA-Z]+)*)\s*([\u4e00-\u9fa5]+.*?)(?=\s*[a-zA-Z]+|$)/g,
                    // 模式3：词组 + 中文
                    /([a-zA-Z]+(?:-[a-zA-Z]+)*)\s+([a-zA-Z]+(?:-[a-zA-Z]+)*)\s*([\u4e00-\u9fa5]+.*?)(?=\s*[a-zA-Z]+|$)/g
                ];
                
                for (const pattern of patterns) {
                    let match;
                    const seenWords = new Set();
                    
                    while ((match = pattern.exec(cleanText)) !== null) {
                        let english = '';
                        let phonetic = '';
                        let chinese = '';
                        
                        // 根据正则表达式的捕获组数量确定词性和中文释义的位置
                        if (match.length === 4) {
                            if (match[2].match(/[/\[]/)) {
                                // 模式1：单词 + 音标 + 中文
                                english = match[1];
                                phonetic = match[2] ? match[2].trim() : '';
                                chinese = match[3] ? match[3].trim() : '';

                                english = `${match[1]} ${match[2]}`;
                                chinese = match[3] ? match[3].trim() : '';

        // 解析单词详情（词性、音标和中文释义）
        function parseWordDetails(line) {

            console.log('解析单词详情:', line);
            
            // 尝试提取音标（通常在 / / 或 [ ] 中）
            const phoneticMatch = line.match(/([/\\[\(].*?[/\\]\])/);
            if (phoneticMatch) {

        // 移除重复单词
        function removeDuplicateWords(words) {
            const seenWords = new Set();
            const uniqueWords = [];
            
            for (const word of words) {
                const wordKey = word.english.toLowerCase();
                if (!seenWords.has(wordKey)) {
                    seenWords.add(wordKey);
                    uniqueWords.push(word);
                }
            }
            
            return uniqueWords;
        }

        // 分析单词的音节（改进版）
        function analyzeSyllables(word) {
            // 常见的元音组合
            const vowelPatterns = /[aeiouy]+|(?:ai|ay|ea|ee|ei|ey|oa|oe|oi|oy|ou|ow|ui|uy)/gi;
            const vowels = 'aeiouy';
            
            // 找到所有的元音和元音组合
            const vowelMatches = word.match(vowelPatterns) || [];
            const syllables = [];
            let lastIndex = 0;
            
            for (let i = 0; i < vowelMatches.length; i++) {
                const match = vowelMatches[i];
                const matchIndex = word.indexOf(match, lastIndex);
                
                // 确定音节的结束位置
                let endIndex = matchIndex + match.length;
                
                // 处理辅音
                if (i < vowelMatches.length - 1) {
                    const nextVowelIndex = word.indexOf(vowelMatches[i+1], endIndex);
                    const consonantsBetween = word.substring(endIndex, nextVowelIndex);
                    
                    if (consonantsBetween.length === 1) {
                        // 单个辅音，归属于下一音节
                        endIndex = endIndex;
                    } else if (consonantsBetween.length >= 2) {
                        // 两个或更多辅音，通常前一半归属于当前音节
                        const splitPoint = Math.floor(consonantsBetween.length / 2);
                        endIndex = endIndex + splitPoint;
                    }
                }
                
                // 提取音节
                const syllable = word.substring(lastIndex, endIndex);
                syllables.push(syllable);
                lastIndex = endIndex;
            }
            
            // 处理剩余的字符
            if (lastIndex < word.length) {
                syllables[syllables.length - 1] += word.substring(lastIndex);
            }
            
            return syllables;
        }

                for (let i = 0; i < syllables.length; i++) {
                    const color = colors[i % colors.length];
                    coloredWord += `<span style="color: ${color}; font-weight: bold;">${syllables[i]}</span>`;
                }
                
                wordElement.innerHTML = coloredWord;
            } else {
                wordElement.textContent = word.english;
            }
            
            document.getElementById('currentMeaning').textContent = word.chinese;
            document.getElementById('progressText').textContent = `单词 ${currentWordIndex + 1}/${currentWords.length}`;
            
            // 显示例句
            const exampleSentence = exampleSentences[word.english];
            if (exampleSentence) {
                document.getElementById('sentenceEnglish').textContent = exampleSentence.english;
                document.getElementById('sentenceChinese').textContent = exampleSentence.chinese;
                document.getElementById('exampleSentence').style.display = 'block';
            } else {
                // 如果没有找到例句，显示默认提示
                document.getElementById('sentenceEnglish').textContent = '暂无例句';
                document.getElementById('sentenceChinese').textContent = '';
                document.getElementById('exampleSentence').style.display = 'block';
            }
            
            // 查询并显示音标
            try {
                const phonetic = await fetchPhonetic(word.english);
                document.getElementById('currentPhonetic').textContent = phonetic;
            } catch (error) {
                console.error('获取音标失败:', error);
                document.getElementById('currentPhonetic').textContent = '';
            }
            
            document.getElementById('prevBtn').disabled = currentWordIndex === 0;
            document.getElementById('nextBtn').disabled = currentWordIndex === currentWords.length - 1;
        }

        // 播放发音
        function playPronunciation() {
            const currentWords = wordLibrary.currentWords;
            console.log('播放发音 - 当前单词库:', currentWords);
            console.log('当前单词索引:', currentWordIndex);
            
            if (currentWords.length === 0) {
                document.getElementById('feedback').textContent = "请先上传PDF文件并选择页面";
                document.getElementById('voiceStatus').textContent = "单词库为空，无法播放发音";
                console.error('单词库为空，无法播放发音');
                return;
            }
            
            if (currentWordIndex < 0 || currentWordIndex >= currentWords.length) {
                document.getElementById('feedback').textContent = "单词索引无效";
                document.getElementById('voiceStatus').textContent = "单词索引无效，无法播放发音";
                console.error('单词索引无效:', currentWordIndex);
                return;
            }
            
            const word = currentWords[currentWordIndex];
            console.log('当前单词:', word);
            
            if (!word || !word.english) {
                document.getElementById('feedback').textContent = "单词数据无效";
                document.getElementById('voiceStatus').textContent = "单词数据无效，无法播放发音";
                console.error('单词数据无效:', word);
                return;
            }
            
            console.log('准备播放单词:', word.english);
            speakWord(word.english);
            document.getElementById('feedback').textContent = "点击麦克风开始跟读单词";
            document.getElementById('voiceStatus').textContent = "正在播放发音...";
        }

        // 文本转语音
        function speakWord(text) {
            // 检查是否有用户交互
            if (!hasUserInteraction) {
                console.warn('未检测到用户交互，语音合成可能被浏览器阻止');
                document.getElementById('voiceStatus').textContent = '请先点击页面任意位置激活语音功能';
                alert('请先点击页面任意位置激活语音功能\n\n浏览器限制：语音合成需要先有用户交互才能使用');
                return;
            }
            
            if ('speechSynthesis' in window) {
                try {
                    // 清除之前的队列
                    speechSynthesis.cancel();
                    
                    // 创建简单的语音合成实例
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    
                    // 添加事件监听器
                    utterance.onstart = function() {
                        console.log('语音合成开始播放');
                        document.getElementById('voiceStatus').textContent = '正在播放发音...';
                    };
                    
                    utterance.onend = function() {
                        console.log('语音合成播放完成');
                        document.getElementById('voiceStatus').textContent = '语音功能准备就绪';
                    };
                    
                    utterance.onerror = function(event) {
                        console.error('语音合成错误:', event.error);
                        document.getElementById('voiceStatus').textContent = '语音合成错误: ' + event.error;
                        
                        // 显示详细的错误信息
                        let errorMessage = '语音合成失败';
                        switch(event.error) {
                            case 'canceled':
                                errorMessage = '语音合成被取消，请检查浏览器设置';
                                break;
                            case 'interrupted':
                                errorMessage = '语音合成被中断，请重试';
                                break;
                            case 'not-allowed':
                                errorMessage = '语音合成权限被拒绝，请检查浏览器设置';
                                break;
                            default:
                                errorMessage = '语音合成失败: ' + event.error;
                        }
                        
                        alert(errorMessage + '\n\n解决方法：\n1. 确保浏览器允许网站使用语音合成\n2. 检查系统音量是否开启\n3. 尝试刷新页面后重试\n4. 如果使用Chrome，请确保是最新版本');
                    };
                    
                    // 直接播放，不使用语音选择，避免Chrome中的问题
                    console.log('准备播放语音:', text);
                    speechSynthesis.speak(utterance);
                    console.log('语音合成请求已发送');
                } catch (error) {
                    console.error('语音合成异常:', error);
                    document.getElementById('voiceStatus').textContent = '语音合成异常';
                    alert('语音合成失败，请检查浏览器设置\n\n错误信息: ' + error.message);
                }
            } else {
                console.log('浏览器不支持语音合成功能');
                document.getElementById('voiceStatus').textContent = '浏览器不支持语音合成';
                alert('您的浏览器不支持语音合成功能\n\n建议使用Chrome、Edge或Firefox浏览器');
            }
        }



        // 重复单词
        function repeatWord() {
            playPronunciation();
        }
        
        // 播放例句
        function playSentence() {
            const sentenceElement = document.getElementById('sentenceEnglish');
            const sentence = sentenceElement.textContent;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(sentence);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
                
                // 更新状态显示
                document.getElementById('voiceStatus').textContent = "正在播放例句...";
                
                // 播放完成后更新状态
                utterance.onend = function() {
                    document.getElementById('voiceStatus').textContent = "语音功能准备就绪";
                };
            } else {
                document.getElementById('voiceStatus').textContent = "您的浏览器不支持语音合成功能";
            }
        }

        // 初始化语音识别
        function initSpeechRecognition() {
            // 检查浏览器是否支持语音识别
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || window.mozSpeechRecognition || window.msSpeechRecognition;
            
            if (SpeechRecognition) {
                try {
                    recognition = new SpeechRecognition();
                    recognition.lang = 'en-US';
                    recognition.interimResults = false;
                    recognition.maxAlternatives = 1;
                    // 增加超时时间到10秒
                    recognition.timeout = 10000;
                    // 允许连续识别
                    recognition.continuous = false;
                    
                    recognition.onresult = (event) => {
                        const transcript = event.results[0].transcript;
                        console.log('语音识别结果:', transcript);
                        evaluatePronunciation(transcript);
                    };
                    
                    recognition.onerror = (event) => {
                        console.error('语音识别错误:', event.error);
                        let errorMessage = "语音识别错误，请重试";
                        
                        // 提供更详细的错误信息
                        switch (event.error) {
                            case 'no-speech':
                                errorMessage = "未检测到语音，请重试\n\n提示：请靠近麦克风，清晰地说出单词";
                                break;
                            case 'audio-capture':
                                errorMessage = "无法访问麦克风，请检查权限设置\n\n提示：在浏览器地址栏右侧点击锁图标，允许网站使用麦克风";
                                break;
                            case 'not-allowed':
                                errorMessage = "麦克风权限被拒绝，请在浏览器设置中允许访问\n\n提示：进入浏览器设置 > 隐私和安全 > 网站设置 > 麦克风，允许本网站使用麦克风";
                                break;
                            case 'aborted':
                                errorMessage = "语音识别被中止";
                                break;
                            case 'network':
                                errorMessage = "网络错误，请检查网络连接后重试";
                                break;
                            default:
                                errorMessage = "语音识别错误: " + event.error + "，请重试";
                        }
                        
                        document.getElementById('voiceStatus').textContent = errorMessage;
                        stopRecording();
                    };
                    
                    recognition.onend = () => {
                        stopRecording();
                    };
                    
                    console.log('语音识别初始化成功');
                    document.getElementById('voiceStatus').textContent = '语音功能准备就绪\n\n使用提示：点击麦克风后，请清晰地说出单词';
                } catch (error) {
                    console.error('语音识别初始化失败:', error);
                    document.getElementById('voiceStatus').textContent = "语音识别初始化失败，请检查浏览器设置\n\n建议：使用Chrome或Edge浏览器，并确保麦克风权限已开启";
                }
            } else {
                console.log('浏览器不支持语音识别功能');
                document.getElementById('voiceStatus').textContent = "您的浏览器不支持语音识别，请使用Chrome或Edge浏览器";
            }
        }

        // 开始/停止录音
        function toggleRecording() {
            if (!recognition) {
                alert("语音识别不可用");
                return;
            }
            
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        // 开始录音
        function startRecording() {
            isRecording = true;
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('recordBtn').textContent = "⏹️";
            document.getElementById('feedback').textContent = "正在录音...请跟读单词";
            recognition.start();
        }

        // 停止录音
        function stopRecording() {
            isRecording = false;
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordBtn').textContent = "🎤";
        }

        // 评估发音
        function evaluatePronunciation(spokenText) {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                document.getElementById('feedback').textContent = "请先上传PDF文件并选择页面";
                return;
            }
            
            // 检查currentWordIndex是否有效
            if (currentWordIndex < 0 || currentWordIndex >= currentWords.length) {
                document.getElementById('feedback').textContent = "单词索引无效";
                return;
            }
            
            // 检查单词数据是否有效
            const word = currentWords[currentWordIndex];
            if (!word || !word.english) {
                document.getElementById('feedback').textContent = "单词数据无效";
                return;
            }
            
            const correctWord = word.english.toLowerCase();
            const spokenWord = spokenText.toLowerCase();
            
            let score = 0;
            let feedback = "";
            
            if (spokenWord === correctWord) {
                score = 5;
                feedback = "太棒了！发音非常标准！";
            } else if (spokenWord.includes(correctWord) || correctWord.includes(spokenWord)) {
                score = 4;
                feedback = "很好！发音基本正确！";
            } else if (spokenWord.length === correctWord.length) {
                score = 3;
                feedback = "不错！再听一次标准发音试试？";
            } else {
                score = 2;
                feedback = "加油！点击喇叭再听一次标准发音";
            }
            
            displayScore(score, feedback);
        }

        // 显示评分
        function displayScore(score, feedback) {
            const stars = document.getElementById('scoreStars');
            stars.textContent = "★".repeat(score) + "☆".repeat(5 - score);
            document.getElementById('feedback').textContent = feedback;
            
            if (score >= 4) {
                speakWord("Excellent!");
            } else if (score >= 3) {
                speakWord("Good job!");
            } else {
                speakWord("Try again!");
            }
        }

        // 上一个单词
        function prevWord() {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                return;
            }
            
            if (currentWordIndex > 0) {
                currentWordIndex--;
                updateWordDisplay();
            }
        }

        // 下一个单词
        function nextWord() {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                return;
            }
            
            if (currentWordIndex < currentWords.length - 1) {
                currentWordIndex++;
                updateWordDisplay();
            }
        }

        // 更新测试显示
        function updateTestDisplay() {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                document.getElementById('testQuestion').textContent = '请先上传PDF文件并选择页面';
                document.getElementById('answerInput').placeholder = '';
                document.getElementById('testProgress').textContent = '题目 0/0';
                document.getElementById('testResult').style.display = 'none';
                document.getElementById('answerInput').value = '';
                document.getElementById('prevTestBtn').disabled = true;
                document.getElementById('nextTestBtn').disabled = true;
                return;
            }
            
            const word = currentWords[currentTestIndex];
            const questionElement = document.getElementById('testQuestion');
            const inputElement = document.getElementById('answerInput');
            
            // 只显示汉译英的问题
            questionElement.textContent = `中文 "${word.chinese}" 对应的英文单词是？`;
            inputElement.placeholder = "请输入英文单词...";
            
            document.getElementById('testProgress').textContent = `题目 ${currentTestIndex + 1}/${currentWords.length}`;
            document.getElementById('testResult').style.display = 'none';
            inputElement.value = '';
            
            document.getElementById('prevTestBtn').disabled = currentTestIndex === 0;
            document.getElementById('nextTestBtn').disabled = currentTestIndex === currentWords.length - 1;
        }

        // 开始语音输入
        function startVoiceInput() {
            if (!recognition) {
                alert("语音识别不可用");
                return;
            }
            
            recognition.lang = testType === 'enToCn' ? 'zh-CN' : 'en-US';
            recognition.start();
            
            document.getElementById('answerInput').placeholder = "正在聆听...";
            
            recognition.onresult = (event) => {
                const transcript = event.results[0].transcript;
                document.getElementById('answerInput').value = transcript;
            };
        }

        // 检查答案
        function checkAnswer() {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                document.getElementById('testResult').textContent = "请先上传PDF文件并选择页面";
                document.getElementById('testResult').className = 'result error';
                document.getElementById('testResult').style.display = 'block';
                return;
            }
            
            const userAnswer = document.getElementById('answerInput').value.trim();
            const word = currentWords[currentTestIndex];
            const resultElement = document.getElementById('testResult');
            
            // 检查答案是否为空
            if (!userAnswer) {
                resultElement.textContent = "✗ 错误！答案不能为空";
                resultElement.className = 'result wrong';
                speakWord("Try again!");
                resultElement.style.display = 'block';
                return;
            }
            
            // 只验证英文单词（汉译英）
            const isCorrect = userAnswer.toLowerCase() === word.english.toLowerCase();
            
            if (isCorrect) {
                resultElement.textContent = `✓ 正确！${word.english} - ${word.chinese}`;
                resultElement.className = 'result correct';
                speakWord("Correct!");
            } else {
                resultElement.textContent = `✗ 错误！正确答案：${word.english} - ${word.chinese}`;
                resultElement.className = 'result wrong';
                speakWord("Try again!");
            }
            
            resultElement.style.display = 'block';
        }

        // 上一题
        function prevTest() {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                return;
            }
            
            if (currentTestIndex > 0) {
                currentTestIndex--;
                updateTestDisplay();
            }
        }

        // 下一题
        function nextTest() {
            const currentWords = wordLibrary.currentWords;
            if (currentWords.length === 0) {
                return;
            }
            
            if (currentTestIndex < currentWords.length - 1) {
                currentTestIndex++;
                updateTestDisplay();
            }
        }
    </script>
</body>
</html>
